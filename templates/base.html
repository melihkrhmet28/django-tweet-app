<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tweet app</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary p-3" data-bs-theme="dark">
  <div class="container-fluid">
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarTogglerDemo01" aria-controls="navbarTogglerDemo01" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarTogglerDemo01">
      <a class="navbar-brand" href="{% url 'tweetapp:listtweet' %}">Tweet App</a>
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="{% url 'tweetapp:listtweet' %}">List Tweets</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'tweetapp:addtweet' %}">Add Tweet</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'tweetapp:addtweetbyform' %}">Add Tweet By Form</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'tweetapp:addtweetbymodelform' %}">Add Tweet By Model Form</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'tweetapp:signup' %}">Signup</a>
        </li>
      </ul>
    </div>
  </div>
  
  <div class="d-flex dm-3">
    <a class="btn btn-outline-light" href="{% url 'login' %}">Login</a>
  </div>
  <div class="d-flex dm-3">
    <form method="post" action="{% url 'logout' %}">
      {% csrf_token %}
      <input type="hidden" name="next" value="/">
      <button type="submit" class="btn btn-outline-danger">Logout</button>
    </form>
  </div>
</nav>
    {% block content %}
    {% endblock %}
</body>
</html>
